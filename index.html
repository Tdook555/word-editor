<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Word Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f6f3;
            --surface: #ffffff;
            --border: #e8e4df;
            --text: #2c2825;
            --text-muted: #9a9289;
            --accent: #3d6b4f;
            --accent-light: #edf4f0;
            --accent-hover: #2e5340;
            --danger: #c0392b;
            --danger-light: #fdf0ef;
            --blue: #2d5f8a;
            --blue-light: #edf3f8;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 620px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-family: 'Prompt', sans-serif;
            font-weight: 600;
            font-size: 22px;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-family: 'Prompt', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
        }

        /* File Upload */
        .file-drop {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .file-drop:hover, .file-drop.dragover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .file-drop input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .file-drop-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .file-drop-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        .file-drop-text strong {
            color: var(--accent);
        }

        .file-list {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .file-tag {
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Pairs */
        .pair {
            display: grid;
            grid-template-columns: 1fr 1fr 36px;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .pair input {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            color: var(--text);
            background: var(--bg);
            transition: border-color 0.15s;
            outline: none;
        }

        .pair input:focus {
            border-color: var(--accent);
            background: white;
        }

        .pair input::placeholder {
            color: var(--text-muted);
        }

        .btn-remove {
            width: 36px;
            height: 36px;
            background: var(--danger-light);
            color: var(--danger);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .btn-remove:hover { background: #f5c6c2; }

        .pair-labels {
            display: grid;
            grid-template-columns: 1fr 1fr 36px;
            gap: 8px;
            margin-bottom: 6px;
        }

        .pair-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            padding-left: 2px;
        }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Sarabun', sans-serif;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-add {
            background: var(--blue-light);
            color: var(--blue);
            margin-top: 4px;
        }

        .btn-add:hover { background: #dce9f3; }

        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
            justify-content: center;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            margin-top: 8px;
        }

        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { background: #b0c9bb; cursor: not-allowed; }

        /* Preview */
        #previewBox {
            display: none;
            margin-bottom: 16px;
        }

        .preview-item {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .preview-found {
            background: var(--accent-light);
            border-left: 3px solid var(--accent);
        }

        .preview-not-found {
            background: #fdf6ec;
            border-left: 3px solid #e67e22;
        }

        .preview-filename {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 3px;
        }

        .preview-detail {
            color: var(--text-muted);
            font-size: 12px;
        }

        .preview-count {
            display: inline-block;
            background: var(--accent);
            color: white;
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 11px;
            margin-left: 4px;
        }

        /* Status */
        #status {
            text-align: center;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
            display: none;
        }

        #status.loading { background: var(--blue-light); color: var(--blue); display: block; }
        #status.success { background: var(--accent-light); color: var(--accent); display: block; }
        #status.error { background: var(--danger-light); color: var(--danger); display: block; }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        .arrow-icon {
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
            padding-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Word File Editor</h1>
            <p>แก้ไขคำในไฟล์ .docx หลายไฟล์พร้อมกัน</p>
        </div>

        <!-- File Upload -->
        <div class="card">
            <div class="card-title">เลือกไฟล์</div>
            <div class="file-drop" id="fileDrop">
                <input type="file" id="fileInput" accept=".docx" multiple />
                <div class="file-drop-icon">📂</div>
                <div class="file-drop-text"><strong>คลิกเพื่อเลือกไฟล์</strong> หรือลากมาวางที่นี่</div>
                <div class="file-drop-text" style="font-size:12px; margin-top:4px;">รองรับไฟล์ .docx เท่านั้น</div>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <!-- Pairs -->
        <div class="card">
            <div class="card-title">คำที่ต้องการเปลี่ยน</div>
            <div class="pair-labels">
                <span class="pair-label">คำเดิม</span>
                <span class="pair-label">คำใหม่</span>
                <span></span>
            </div>
            <div id="pairs">
                <div class="pair">
                    <input type="text" placeholder="เช่น 2568" class="oldVal" />
                    <input type="text" placeholder="เช่น 2569" class="newVal" />
                    <button class="btn-remove" onclick="removePair(this)">✕</button>
                </div>
            </div>
            <button class="btn btn-add" onclick="addPair()">+ เพิ่มคู่คำ</button>
        </div>

        <!-- Preview -->
        <div id="previewBox" class="card">
            <div class="card-title">ผลการตรวจสอบ</div>
            <div id="previewContent"></div>
            <div class="divider"></div>
            <button class="btn btn-primary" onclick="doEdit()" id="confirmBtn">⬇️ ดาวน์โหลดไฟล์ที่แก้ไขแล้ว</button>
        </div>

        <!-- Main Action -->
        <div id="mainAction">
            <button class="btn btn-primary" onclick="doPreview()" id="previewBtn">🔍 ตรวจสอบก่อนแก้ไข</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        // File drop
        const fileDrop = document.getElementById('fileDrop');
        const fileInput = document.getElementById('fileInput');

        fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('dragover'); });
        fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
        fileDrop.addEventListener('drop', e => {
            e.preventDefault();
            fileDrop.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            updateFileList();
        });
        fileInput.addEventListener('change', updateFileList);

        function updateFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            for (let f of fileInput.files) {
                const tag = document.createElement('span');
                tag.className = 'file-tag';
                tag.textContent = f.name;
                list.appendChild(tag);
            }
            // reset preview
            document.getElementById('previewBox').style.display = 'none';
            document.getElementById('mainAction').style.display = 'block';
        }

        function addPair() {
            const div = document.createElement('div');
            div.className = 'pair';
            div.innerHTML = `
                <input type="text" placeholder="คำเดิม" class="oldVal" />
                <input type="text" placeholder="คำใหม่" class="newVal" />
                <button class="btn-remove" onclick="removePair(this)">✕</button>
            `;
            document.getElementById('pairs').appendChild(div);
        }

        function removePair(btn) {
            const pairs = document.querySelectorAll('.pair');
            if (pairs.length > 1) btn.parentElement.remove();
        }

        function getPairsData() {
            const oldVals = [...document.querySelectorAll('.oldVal')].map(i => i.value);
            const newVals = [...document.querySelectorAll('.newVal')].map(i => i.value);
            return oldVals.map((o, i) => ({ old: o, new: newVals[i] })).filter(p => p.old);
        }

        function setStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = type;
        }

        async function doPreview() {
            const files = fileInput.files;
            if (!files.length) { setStatus('⚠️ กรุณาเลือกไฟล์', 'error'); return; }
            const pairs = getPairsData();
            if (!pairs.length) { setStatus('⚠️ กรุณาใส่คู่คำ', 'error'); return; }

            setStatus('⏳ กำลังตรวจสอบ...', 'loading');
            const formData = new FormData();
            for (let f of files) formData.append('files', f);
            formData.append('pairs', JSON.stringify(pairs));

            try {
                const res = await fetch('http://localhost:8000/preview', { method: 'POST', body: formData });
                const data = await res.json();
                showPreview(data);
                setStatus('', '');
            } catch(e) {
                setStatus('❌ เกิดข้อผิดพลาด', 'error');
            }
        }

        function showPreview(data) {
            const content = document.getElementById('previewContent');
            content.innerHTML = '';
            let totalFound = 0;

            for (const item of data) {
                const div = document.createElement('div');
                const found = item.total > 0;
                totalFound += item.total;
                div.className = `preview-item ${found ? 'preview-found' : 'preview-not-found'}`;
                div.innerHTML = `
                    <div class="preview-filename">${item.filename} ${found ? `<span class="preview-count">${item.total} จุด</span>` : ''}</div>
                    <div class="preview-detail">${found ? item.details.join(', ') : '⚠️ ไม่พบคำที่ต้องการเปลี่ยน'}</div>
                `;
                content.appendChild(div);
            }

            document.getElementById('previewBox').style.display = 'block';
            document.getElementById('mainAction').style.display = 'none';
        }

        async function doEdit() {
            const files = fileInput.files;
            const pairs = getPairsData();
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.textContent = '⏳ กำลังแก้ไข...';

            const formData = new FormData();
            for (let f of files) formData.append('files', f);
            formData.append('pairs', JSON.stringify(pairs));

            try {
                const res = await fetch('http://localhost:8000/edit', { method: 'POST', body: formData });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = files.length > 1 ? 'edited_files.zip' : 'edited_' + files[0].name;
                    a.click();
                    btn.textContent = '✅ ดาวน์โหลดสำเร็จ!';
                    btn.style.background = '#2d5f8a';
                } else {
                    btn.textContent = '❌ เกิดข้อผิดพลาด';
                    btn.disabled = false;
                }
            } catch(e) {
                btn.textContent = '❌ เกิดข้อผิดพลาด';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
